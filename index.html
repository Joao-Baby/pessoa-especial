<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pessoa-especial</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Miguel</h1>
    <p>Para um amigo especial</p>
  </header>

  <section class="container">

    <div class="profile">
      <img src="img/miguel.jpg" alt="Foto da pessoa homenageada">
    </div>

    <div class="content">
      <h2>Olá,</h2>
      <p>um pouco sobre você:</p>

      <div class="buttons">
        <div class="btn red">AMIZADE</div>
        <div class="btn blue">DIVERSÃO</div>
        <div class="btn yellow">PARCERIA</div>
      </div>

      <p>
        Amigo, só queria dizer que você é importante pra mim.
        Mesmo na correria, é bom saber que posso contar com você. 
        Valeu pela parceria de sempre!
      </p>
    </div>

  </section>

  <footer>
    <p>Assinado: João Victor dos Santos Angelo</p>
  </footer>

</body>
</html>
